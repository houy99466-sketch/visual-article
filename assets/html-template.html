<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{TITLE}}</title>
  <style>
    :root {
      --ink: #17202a;
      --muted: #667085;
      --paper: #fbfaf7;
      --panel: #ffffff;
      --line: #d9dee7;
      --blue: #2f6fed;
      --green: #20866f;
      --amber: #c97918;
      --rose: #c94f6d;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, "Microsoft YaHei", sans-serif;
      color: var(--ink);
      background: var(--paper);
      line-height: 1.72;
    }
    main { width: min(1080px, calc(100% - 32px)); margin: 0 auto; }
    header { padding: 64px 0 32px; }
    h1 { font-size: clamp(32px, 5vw, 58px); line-height: 1.12; margin: 0 0 18px; }
    h2 { font-size: clamp(24px, 3vw, 34px); margin: 56px 0 16px; }
    p { font-size: 18px; margin: 0 0 16px; }
    .summary {
      max-width: 820px;
      font-size: 20px;
      color: var(--muted);
    }
    section { padding: 10px 0 18px; }
    .visual {
      margin: 28px 0;
      padding: 24px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
    }
    .caption {
      margin-top: 14px;
      color: var(--muted);
      font-size: 15px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
    }
    .node {
      border: 1px solid var(--line);
      border-left: 5px solid var(--blue);
      background: #fff;
      border-radius: 8px;
      padding: 16px;
      min-height: 96px;
    }
    .node strong { display: block; margin-bottom: 6px; }
    svg { max-width: 100%; height: auto; display: block; }
    footer { padding: 42px 0 64px; color: var(--muted); }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>{{TITLE}}</h1>
      <p class="summary">{{SUMMARY}}</p>
    </header>
    {{BODY}}
    <footer>{{CLOSING}}</footer>
  </main>
</body>
</html>
